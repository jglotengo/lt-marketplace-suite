version: '3.9'

# ============================================================
# LT Marketplace Suite - Docker Compose (Entorno Local DEV)
# ============================================================

services:

  # ── WordPress + WooCommerce ─────────────────────────────────
  wordpress:
    image: wordpress:6.5-php8.2-apache
    container_name: ltms_wordpress
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST:     db
      WORDPRESS_DB_USER:     ltms_user
      WORDPRESS_DB_PASSWORD: ltms_dev_password
      WORDPRESS_DB_NAME:     ltms_db
      WORDPRESS_DEBUG:       "1"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('SCRIPT_DEBUG', true);
        define('LTMS_ENVIRONMENT', 'development');
        define('LTMS_COUNTRY', 'CO');
        define('LTMS_ENCRYPTION_KEY', 'dev-key-change-in-production-32c');
    volumes:
      - wordpress_data:/var/www/html
      - ./:/var/www/html/wp-content/plugins/lt-marketplace-suite
      - ./docker/php-local.ini:/usr/local/etc/php/conf.d/ltms-local.ini
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ltms_net

  # ── MariaDB ──────────────────────────────────────────────────
  db:
    image: mariadb:10.11
    container_name: ltms_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE:      ltms_db
      MYSQL_USER:          ltms_user
      MYSQL_PASSWORD:      ltms_dev_password
    volumes:
      - db_data:/var/lib/mysql
      - ./database_schema_full.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database_triggers.sql:/docker-entrypoint-initdb.d/02-triggers.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ltms_net

  # ── Redis (Cache) ─────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: ltms_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - ltms_net

  # ── phpMyAdmin (Herramienta DB Dev) ──────────────────────────
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: ltms_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: ltms_user
      PMA_PASSWORD: ltms_dev_password
    depends_on:
      - db
    networks:
      - ltms_net

  # ── Mailpit (Captura emails en dev) ──────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: ltms_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # UI web
      - "1025:1025"   # SMTP
    networks:
      - ltms_net

volumes:
  wordpress_data:
  db_data:

networks:
  ltms_net:
    driver: bridge
