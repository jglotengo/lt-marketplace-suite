name: Deploy LTMS to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Copy QA script to server via SSH
        run: |
          sudo apt-get install -y sshpass 2>/dev/null || true
          sshpass -p 'sT6v>2@1,@11' scp -o StrictHostKeyChecking=no -P 18765 \
            deploy/ltms-qa.php \
            u1549-ruo8hvwpk9dt@ssh.lo-tengo.com.co:/home/customer/www/lo-tengo.com.co/public_html/ltms-qa.php \
            2>&1 || echo "SCP failed (non-critical)"
          sshpass -p 'sT6v>2@1,@11' scp -o StrictHostKeyChecking=no -P 18765 \
            deploy/ltms-fix-sellers-now.php \
            u1549-ruo8hvwpk9dt@ssh.lo-tengo.com.co:/home/customer/www/lo-tengo.com.co/public_html/ltms-fix-sellers-now.php \
            2>&1 || echo "SCP fix-sellers failed (non-critical)"
          sshpass -p 'sT6v>2@1,@11' scp -o StrictHostKeyChecking=no -P 18765 \
            deploy/ltms-publish-legal-pages-2026-07-22.php \
            u1549-ruo8hvwpk9dt@ssh.lo-tengo.com.co:/home/customer/www/lo-tengo.com.co/public_html/wp-content/plugins/lt-marketplace-suite/deploy/ltms-publish-legal-pages-2026-07-22.php \
            2>&1 || echo "SCP legal-pages failed (non-critical)"

      - name: Trigger deploy webhook
        run: |
          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            --max-time 45 --retry 3 --retry-delay 5 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: text/plain,application/json" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            "https://lo-tengo.com.co/ltms-deploy-webhook.php?token=${{ secrets.DEPLOY_TOKEN }}")
          echo "HTTP status: $HTTP_CODE"
          cat /tmp/response.txt
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
            echo "Deploy triggered successfully"
          else
            echo "Webhook failed with status $HTTP_CODE"
            exit 0
          fi

      - name: Trigger backfill (webhook self-updated on previous call)
        run: |
          sleep 5
          HTTP_CODE=$(curl -s -o /tmp/backfill_response.txt -w "%{http_code}" \
            --max-time 60 --retry 2 --retry-delay 10 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: text/plain,application/json" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            "https://lo-tengo.com.co/ltms-deploy-webhook.php?token=${{ secrets.DEPLOY_TOKEN }}&backfill=1")
          echo "Backfill HTTP status: $HTTP_CODE"
          cat /tmp/backfill_response.txt

      - name: Trigger diagnostic report
        run: |
          sleep 3
          HTTP_CODE=$(curl -s -o /tmp/report_response.txt -w "%{http_code}" \
            --max-time 60 --retry 2 --retry-delay 10 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: text/plain,application/json" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            "https://lo-tengo.com.co/ltms-deploy-webhook.php?token=${{ secrets.DEPLOY_TOKEN }}&report=1")
          echo "Report HTTP status: $HTTP_CODE"
          echo "=== DIAGNOSTIC REPORT ==="
          cat /tmp/report_response.txt
