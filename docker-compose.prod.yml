version: '3.9'

# ============================================================
# LT Marketplace Suite - Docker Compose (Producción)
# Usar con: docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:

  # ── Nginx (Reverse Proxy + TLS) ───────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ltms_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - wordpress_data:/var/www/html:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - wordpress
    networks:
      - ltms_prod_net

  # ── WordPress + PHP-FPM ────────────────────────────────────────
  wordpress:
    image: wordpress:6.5-php8.2-fpm
    container_name: ltms_wordpress_prod
    restart: always
    environment:
      WORDPRESS_DB_HOST:     db:3306
      WORDPRESS_DB_USER:     ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME:     ${DB_NAME}
      WORDPRESS_TABLE_PREFIX: ${DB_TABLE_PREFIX:-wp_}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', false);
        define('WP_DEBUG_LOG', false);
        define('DISALLOW_FILE_EDIT', true);
        define('DISALLOW_FILE_MODS', true);
        define('FORCE_SSL_ADMIN', true);
        define('LTMS_ENVIRONMENT', 'production');
        define('LTMS_COUNTRY', '${LTMS_COUNTRY:-CO}');
        define('LTMS_ENCRYPTION_KEY', '${LTMS_ENCRYPTION_KEY}');
    volumes:
      - wordpress_data:/var/www/html
      - ./php.ini:/usr/local/etc/php/conf.d/ltms-prod.ini:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ltms_prod_net
    security_opt:
      - no-new-privileges:true

  # ── MariaDB (Producción) ──────────────────────────────────────
  db:
    image: mariadb:10.11
    container_name: ltms_db_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./bin/server-configs/mysql-prod.cnf:/etc/mysql/conf.d/prod.cnf:ro
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ltms_prod_net
    security_opt:
      - no-new-privileges:true

  # ── Redis (Cache + Sesiones) ──────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: ltms_redis_prod
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - ltms_prod_net
    security_opt:
      - no-new-privileges:true

volumes:
  wordpress_data:
    driver: local
  db_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  ltms_prod_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
