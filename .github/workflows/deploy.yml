name: Deploy LTMS to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.lo-tengo.com.co
          port: 18765
          username: u1549-ruo8hvwpk9dt
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            PLUGIN_DIR="/home/customer/www/lo-tengo.com.co/public_html/wp-content/plugins/lt-marketplace-suite"
            cd "$PLUGIN_DIR"
            git fetch origin
            git reset --hard origin/main
            echo "✅ Deploy completado: $(git log --oneline -1)"
