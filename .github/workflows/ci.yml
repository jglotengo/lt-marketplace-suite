name: CI
on:
  push:
    branches: [ main, develop, 'release/**', 'hotfix/**' ]
  pull_request:
    branches: [ main, develop ]
jobs:
  lint:
    name: PHP Lint & CS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, json, mysqli
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --ignore-platform-reqs
      - name: PHP Syntax check
        run: find . -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" | xargs -P4 php -l
      - name: PHPCS
        run: composer lint || true
      - name: PHPStan
        run: composer analyse || true
  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, json, mysqli
          tools: composer:v2, phpunit
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --ignore-platform-reqs
      - name: Install WP Test Suite
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1:3306 latest
      - name: Run tests
        run: composer test
  release:
    name: Build Release ZIP
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ lint, test ]
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: Install production dependencies
        run: composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader --ignore-platform-reqs
      - name: Build ZIP
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mkdir -p dist
          zip -r dist/lt-marketplace-suite-v${VERSION}.zip . \
            --exclude "*.git*" \
            --exclude "tests/*" \
            --exclude "bin/*" \
            --exclude ".github/*" \
            --exclude "phpunit.xml" \
            --exclude "phpstan.neon" \
            --exclude "*.DS_Store" \
            --exclude "node_modules/*" \
            --exclude "dist/*"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/lt-marketplace-suite-v*.zip
          generate_release_notes: true