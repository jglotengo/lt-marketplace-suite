# ============================================================
# LT Marketplace Suite - Nginx Hardened Configuration
# Versión para Producción con TLS + Security Headers
# ============================================================

server {
    listen 80;
    server_name _;
    # Redirigir todo HTTP a HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ${SERVER_NAME};

    root /var/www/html;
    index index.php index.html;

    # ── TLS ──────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/${SERVER_NAME}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${SERVER_NAME}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security Headers ─────────────────────────────────────────
    add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options             "SAMEORIGIN" always;
    add_header X-Content-Type-Options      "nosniff" always;
    add_header X-XSS-Protection            "1; mode=block" always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy     "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.openpay.mx https://js.openpay.mx https://checkout.addi.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.siigo.com https://sandbox-api.openpay.mx https://api.openpay.mx; frame-src https://checkout.addi.com;" always;

    # ── Logging ──────────────────────────────────────────────────
    access_log /var/log/nginx/ltms_access.log combined;
    error_log  /var/log/nginx/ltms_error.log warn;

    # ── Límites de Request ────────────────────────────────────────
    client_max_body_size 64M;
    client_body_timeout  60s;
    client_header_timeout 10s;

    # ── Protección de Archivos Sensibles ─────────────────────────
    # Bloquear acceso a archivos ocultos (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Bloquear scripts PHP en uploads (Prevención Shell Upload)
    location ~* /(?:uploads|files)/.*\.php$ {
        deny all;
        return 403;
    }

    # Bloquear acceso directo al vault de LTMS
    location ~* /uploads/ltms-secure-vault/ {
        deny all;
        return 403;
    }

    # Bloquear acceso a logs
    location ~* /uploads/ltms-logs/ {
        deny all;
        return 403;
    }

    # Proteger wp-config.php
    location = /wp-config.php {
        deny all;
    }

    # ── WordPress Permalinks ──────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass          wordpress:9000;
        fastcgi_index         index.php;
        fastcgi_param         SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include               fastcgi_params;
        fastcgi_read_timeout  300;
        fastcgi_buffers       16 16k;
        fastcgi_buffer_size   32k;

        # Prevenir exposición de errores PHP al exterior
        fastcgi_hide_header X-Powered-By;
    }

    # ── Archivos Estáticos con Caché ──────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Rate Limiting para wp-login.php ──────────────────────────
    location = /wp-login.php {
        limit_req zone=ltms_login burst=3 nodelay;
        fastcgi_pass    wordpress:9000;
        fastcgi_index   index.php;
        fastcgi_param   SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include         fastcgi_params;
    }

    # ── Rate Limiting para API REST y AJAX ───────────────────────
    location ~* /wp-json/ltms/ {
        limit_req zone=ltms_api burst=20 nodelay;
        try_files $uri $uri/ /index.php?$args;
    }
}

# ── Zonas de Rate Limiting ───────────────────────────────────
# (Definir en nginx.conf principal o http block)
# limit_req_zone $binary_remote_addr zone=ltms_login:10m rate=5r/m;
# limit_req_zone $binary_remote_addr zone=ltms_api:10m rate=60r/m;
