openapi: 3.1.0
info:
  title: LT Marketplace Suite REST API
  description: |
    REST API for the LT Marketplace Suite WordPress plugin.
    All endpoints require authentication unless marked as public.
    Base path: `/wp-json/ltms/v1`
  version: 1.5.0
  contact:
    name: LTMS Support
    url: https://ltmarketplace.co/soporte
  license:
    name: GNU GPL v2
    url: https://www.gnu.org/licenses/gpl-2.0.html

servers:
  - url: https://your-site.com/wp-json/ltms/v1
    description: Production

tags:
  - name: Vendor
    description: Vendor dashboard and metrics
  - name: Wallet
    description: Wallet and transaction management
  - name: Payouts
    description: Payout requests and processing
  - name: Orders
    description: Vendor order management
  - name: Affiliates
    description: MLM referral network
  - name: KYC
    description: Identity verification
  - name: Admin
    description: Admin-only endpoints

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: wordpress_logged_in
    nonceAuth:
      type: apiKey
      in: header
      name: X-WP-Nonce

  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        data:
          type: object
          properties:
            message:
              type: string
              example: "Authentication required"
            code:
              type: string
              example: "ltms_unauthorized"

    WalletBalance:
      type: object
      properties:
        balance:
          type: string
          example: "150000.00"
        held_balance:
          type: string
          example: "30000.00"
        available_balance:
          type: string
          example: "120000.00"
        currency:
          type: string
          example: "COP"
        is_frozen:
          type: boolean
          example: false

    LedgerEntry:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [commission, payout, referral, adjustment, hold, release]
        amount:
          type: string
        balance_after:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time

    PayoutRequest:
      type: object
      properties:
        id:
          type: integer
        vendor_id:
          type: integer
        amount:
          type: string
        currency:
          type: string
        method:
          type: string
          enum: [bank_transfer, nequi, daviplata, spei, oxxo]
        status:
          type: string
          enum: [pending, approved, rejected, processing, completed]
        reference:
          type: string
        created_at:
          type: string
          format: date-time

    VendorMetrics:
      type: object
      properties:
        monthly_sales:
          type: number
          example: 2500000
        monthly_orders:
          type: integer
          example: 47
        monthly_commissions:
          type: number
          example: 225000
        wallet_balance:
          type: number
          example: 450000
        pending_payouts:
          type: integer
          example: 1
        kyc_status:
          type: string
          enum: [pending, approved, rejected]

    AffiliateStats:
      type: object
      properties:
        referral_code:
          type: string
          example: "CARLR4X2"
        total_referrals:
          type: integer
          example: 12
        active_referrals:
          type: integer
          example: 7
        total_earned:
          type: number
          example: 85000

paths:

  # ── Vendor ─────────────────────────────────────────────────────

  /vendor/metrics:
    get:
      tags: [Vendor]
      summary: Get vendor dashboard metrics
      security:
        - cookieAuth: []
        - nonceAuth: []
      responses:
        '200':
          description: Vendor metrics
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      success:
                        type: boolean
                        example: true
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/VendorMetrics'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Wallet ─────────────────────────────────────────────────────

  /wallet:
    get:
      tags: [Wallet]
      summary: Get current vendor wallet
      security:
        - cookieAuth: []
        - nonceAuth: []
      responses:
        '200':
          description: Wallet data and recent ledger entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      wallet:
                        $ref: '#/components/schemas/WalletBalance'
                      ledger:
                        type: array
                        items:
                          $ref: '#/components/schemas/LedgerEntry'

  # ── Payouts ────────────────────────────────────────────────────

  /payouts:
    post:
      tags: [Payouts]
      summary: Create a payout request
      security:
        - cookieAuth: []
        - nonceAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, method]
              properties:
                amount:
                  type: number
                  minimum: 50000
                  example: 200000
                method:
                  type: string
                  enum: [bank_transfer, nequi, daviplata, spei]
                bank_account:
                  type: string
                  description: Encrypted bank account number
      responses:
        '200':
          description: Payout request created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      payout_id:
                        type: integer
                      message:
                        type: string
        '400':
          description: Validation error (insufficient balance, below minimum, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /payouts/{id}:
    get:
      tags: [Payouts]
      summary: Get a specific payout request
      security:
        - cookieAuth: []
        - nonceAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Payout details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/PayoutRequest'

  # ── Orders ─────────────────────────────────────────────────────

  /orders:
    get:
      tags: [Orders]
      summary: List vendor orders
      security:
        - cookieAuth: []
        - nonceAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [processing, completed, on-hold, cancelled, refunded, any]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      orders:
                        type: array
                        items:
                          type: object
                      total:
                        type: integer
                      pages:
                        type: integer

  # ── Affiliates ─────────────────────────────────────────────────

  /affiliates/stats:
    get:
      tags: [Affiliates]
      summary: Get current vendor's affiliate network stats
      security:
        - cookieAuth: []
        - nonceAuth: []
      responses:
        '200':
          description: Affiliate statistics and tree
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/AffiliateStats'

  /affiliates/leaderboard:
    get:
      tags: [Affiliates]
      summary: Global affiliate leaderboard
      security:
        - cookieAuth: []
        - nonceAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 50
      responses:
        '200':
          description: Leaderboard rankings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        vendor_id:
                          type: integer
                        display_name:
                          type: string
                        total_referrals:
                          type: integer
                        monthly_referral_income:
                          type: number

  # ── Admin ──────────────────────────────────────────────────────

  /admin/dashboard/stats:
    get:
      tags: [Admin]
      summary: Get admin dashboard statistics
      security:
        - cookieAuth: []
        - nonceAuth: []
      responses:
        '200':
          description: Platform-wide statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      monthly_sales:
                        type: number
                      total_vendors:
                        type: integer
                      pending_payouts:
                        type: integer
                      pending_kyc:
                        type: integer
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
