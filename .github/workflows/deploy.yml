name: Deploy LTMS to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via SSH (password auth)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PASS: ${{ secrets.SSH_PASS }}
        run: |
          sshpass -p "$SSH_PASS" ssh \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -p "$SSH_PORT" \
            "$SSH_USER@$SSH_HOST" \
            "cd /home/customer/www/lo-tengo.com.co/public_html/wp-content/plugins/lt-marketplace-suite && git fetch origin && git reset --hard origin/main && echo 'Deploy OK' && git log --oneline -1"
