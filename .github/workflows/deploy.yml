name: Deploy LTMS to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger deploy webhook on server
        run: |
          curl -s -o response.txt -w "%{http_code}" \
            --max-time 30 \
            "https://lo-tengo.com.co/ltms-deploy-webhook.php?token=${{ secrets.DEPLOY_TOKEN }}" \
            > http_code.txt
          CODE=$(cat http_code.txt)
          echo "HTTP status: $CODE"
          cat response.txt
          if [ "$CODE" != "200" ]; then
            echo "Webhook failed with status $CODE"
            exit 1
          fi
