name: One-off - Regenerate vendor (dompdf ^3.0)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Create side branch
        run: |
          git checkout -b oneoff/dompdf-vendor-regen

      - name: composer update dompdf (capture output)
        id: composer_step
        continue-on-error: true
        run: |
          set +e
          composer update dompdf/dompdf --with-all-dependencies --no-interaction --prefer-dist > composer-debug.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          cat composer-debug.log
          exit 0

      - name: Commit results to side branch
        run: |
          git config user.name "ltms-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "chore(deps): one-off dompdf ^3.0 vendor regen attempt (exit=${{ steps.composer_step.outputs.exit_code }})"
          git push origin oneoff/dompdf-vendor-regen --force

      - name: Open PR if composer succeeded
        if: steps.composer_step.outputs.exit_code == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create --base main --head oneoff/dompdf-vendor-regen \
            --title "chore(deps): regenerate vendor/ and composer.lock for dompdf ^3.0" \
            --body "Auto-generated by one-off workflow. composer update dompdf/dompdf ran clean (exit 0). Review vendor/dompdf and composer.lock diffs before merging." || echo "PR creation failed or already exists"
