name: CI

on:
  push:
    branches: [ main, develop, 'release/**', 'hotfix/**' ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # JOB 1: PHP Lint & Code Standards
  # ============================================================
  lint:
    name: PHP Lint & CS (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.1', '8.2' ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json, mysqli, bcmath, intl, openssl
          tools: composer:v2
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-v2-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-v2-${{ matrix.php }}-

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --ignore-platform-reqs

      - name: PHP Syntax check (parallel)
        run: |
          find . -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./node_modules/*" \
            -not -path "./.git/*" \
            | xargs -P4 php -l

      - name: PHPCS — WordPress Coding Standards
        run: composer lint || true

      - name: PHPStan — Static Analysis (level 6)
        run: composer analyse || true

  # ============================================================
  # JOB 2: Unit Tests (sin WordPress, rápidos)
  # ============================================================
  unit-tests:
    name: Unit Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.1', '8.2' ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json, mysqli, bcmath, intl, openssl
          tools: composer:v2
          coverage: xdebug

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-v2-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-v2-${{ matrix.php }}-

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --ignore-platform-reqs

      - name: Run Unit Tests
        env:
          LTMS_UNIT_ONLY: "true"
        run: |
          vendor/bin/phpunit \
            --testsuite=unit \
            --no-coverage

      - name: Run Unit Tests with Coverage
        if: matrix.php == '8.2'
        env:
          LTMS_UNIT_ONLY: "true"
        run: |
          vendor/bin/phpunit \
            --testsuite=unit \
            --coverage-clover=coverage/clover.xml \
            --coverage-html=coverage/html \
            || true
        continue-on-error: true

      - name: Upload Coverage Report
        if: matrix.php == '8.2'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ============================================================
  # JOB 3: Integration Tests (con WordPress + WooCommerce)
  # ============================================================
  integration-tests:
    name: Integration Tests (PHP ${{ matrix.php }}, WP ${{ matrix.wp }})
    runs-on: ubuntu-latest
    needs: unit-tests

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            wp: 'latest'
            wc: 'latest-stable'
          - php: '8.1'
            wp: '6.6'
            wc: '9.4.3'

    services:
      mysql:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
          MYSQL_USER: wp_test
          MYSQL_PASSWORD: wp_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json, mysqli, bcmath, intl, openssl
          tools: composer:v2
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-v2-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-v2-${{ matrix.php }}-

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --ignore-platform-reqs

      - name: Install SVN (requerido por install-wp-tests.sh)
        run: sudo apt-get update -qq && sudo apt-get install -y subversion

      - name: Cache WordPress test suite
        uses: actions/cache@v4
        with:
          path: /tmp/wordpress-tests-lib
          key: wp-tests-${{ matrix.wp }}-${{ runner.os }}
          restore-keys: wp-tests-${{ matrix.wp }}-

      - name: Cache WordPress core
        uses: actions/cache@v4
        with:
          path: /tmp/wordpress
          key: wp-core-${{ matrix.wp }}-${{ runner.os }}
          restore-keys: wp-core-${{ matrix.wp }}-

      - name: Install WP Test Suite
        env:
          WP_VERSION: ${{ matrix.wp }}
        run: |
          bash bin/install-wp-tests.sh \
            wordpress_test \
            root \
            root \
            127.0.0.1:3306 \
            $WP_VERSION

      - name: Install WooCommerce for tests
        run: |
          WP_CORE=/tmp/wordpress
          WC_DIR="$WP_CORE/wp-content/plugins/woocommerce"
          WC_VERSION="${{ matrix.wc }}"

          if [ ! -d "$WC_DIR" ]; then
            echo "Descargando WooCommerce $WC_VERSION para tests..."
            mkdir -p "$WP_CORE/wp-content/plugins"
            WC_URL="https://downloads.wordpress.org/plugin/woocommerce.${WC_VERSION}.zip"
            curl -sL "$WC_URL" -o /tmp/woocommerce.zip
            unzip -q /tmp/woocommerce.zip -d "$WP_CORE/wp-content/plugins/"
            echo "WooCommerce instalado en $WC_DIR"
          else
            echo "WooCommerce ya en caché."
          fi

      - name: Run Integration Tests
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
          WP_CORE_DIR: /tmp/wordpress
          WP_TESTS_DB_NAME: wordpress_test
          WP_TESTS_DB_USER: root
          WP_TESTS_DB_PASS: root
          WP_TESTS_DB_HOST: 127.0.0.1
          LTMS_UNIT_ONLY: "false"
        run: |
          vendor/bin/phpunit \
            --testsuite=integration \
            --no-coverage

  # ============================================================
  # JOB 4: Build Release ZIP (solo en tags v*)
  # ============================================================
  release:
    name: Build Release ZIP
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ lint, unit-tests, integration-tests ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Install production dependencies
        run: |
          composer install \
            --no-interaction \
            --prefer-dist \
            --no-dev \
            --optimize-autoloader \
            --classmap-authoritative \
            --ignore-platform-reqs

      - name: Build ZIP
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mkdir -p dist

          zip -r "dist/lt-marketplace-suite-v${VERSION}.zip" . \
            --exclude "*.git*" \
            --exclude "tests/*" \
            --exclude "bin/*" \
            --exclude ".github/*" \
            --exclude "phpunit.xml" \
            --exclude "phpunit.xml.dist" \
            --exclude "phpstan.neon" \
            --exclude "*.DS_Store" \
            --exclude "node_modules/*" \
            --exclude "dist/*" \
            --exclude "coverage/*" \
            --exclude ".phpunit.cache/*" \
            --exclude "docker/*" \
            --exclude "docker-compose*.yml" \
            --exclude "Makefile" \
            --exclude "*.md" \
            --exclude "composer.json" \
            --exclude "composer.lock"

          echo "ZIP creado:"
          ls -lh "dist/lt-marketplace-suite-v${VERSION}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/lt-marketplace-suite-v*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true