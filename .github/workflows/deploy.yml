name: Deploy LTMS to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Deploy via webhook
        run: |
          HTTP_CODE=$(curl -s -o /tmp/deploy_response.txt -w "%{http_code}" \
            --max-time 30 \
            "https://lo-tengo.com.co/ltms-deploy-webhook.php?token=${{ secrets.DEPLOY_TOKEN }}")
          echo "HTTP status: $HTTP_CODE"
          cat /tmp/deploy_response.txt
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Deploy failed with HTTP $HTTP_CODE"
            exit 1
          fi
