name: One-off - Regenerate vendor (dompdf ^3.0)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Create side branch
        run: |
          git checkout -b oneoff/dompdf-vendor-regen-v4

      - name: Pin brick/math below 0.14 (0.14 requires PHP 8.2, project runs 8.1)
        run: |
          php -r '
            $f = "composer.json";
            $j = json_decode(file_get_contents($f), true);
            $j["require"]["brick/math"] = "<0.14";
            ksort($j["require"]);
            file_put_contents($f, json_encode($j, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES) . "\n");
          '
          cat composer.json

      - name: composer update dompdf + brick/math constraint (no --with-all-dependencies)
        id: composer_step
        continue-on-error: true
        run: |
          set +e
          composer update dompdf/dompdf brick/math --no-interaction --prefer-dist -vvv > composer-debug.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "--- last 200 lines ---"
          tail -n 200 composer-debug.log
          exit 0

      - name: Commit results to side branch (force past .gitignore for the log)
        run: |
          git config user.name "ltms-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git add -f composer-debug.log
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "chore(deps): dompdf ^3.0 vendor regen v4, pin brick/math <0.14 for PHP 8.1 compat (exit=${{ steps.composer_step.outputs.exit_code }})"
          git push origin oneoff/dompdf-vendor-regen-v4 --force

      - name: Open PR if composer succeeded
        if: steps.composer_step.outputs.exit_code == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create --base main --head oneoff/dompdf-vendor-regen-v4 \
            --title "chore(deps): regenerate vendor/ for dompdf ^3.0, pin brick/math <0.14" \
            --body "Auto-generated by one-off workflow. Root cause: ramsey/uuid (already required directly, unrelated to dompdf) allows brick/math up to ^0.14, and brick/math 0.14.x requires PHP 8.2. Project runs PHP 8.1 (SiteGround + composer.json require php >=8.1, no upper bound was previously set). Pinned brick/math to <0.14 so the solver stays on PHP-8.1-compatible versions. Review vendor/dompdf, vendor/brick, composer.json and composer.lock diffs before merging." || echo "PR creation failed or already exists"
