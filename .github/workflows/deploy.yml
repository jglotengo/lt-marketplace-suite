name: Deploy LTMS to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger deploy webhook (bypass SiteGround bot detection)
        run: |
          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            --max-time 45 \
            --retry 3 \
            --retry-delay 5 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36" \
            -H "Accept: text/plain,application/json" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            "https://lo-tengo.com.co/ltms-deploy-webhook.php?token=${{ secrets.DEPLOY_TOKEN }}")

          echo "HTTP status: $HTTP_CODE"
          cat /tmp/response.txt

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
            echo "Deploy triggered successfully"
          else
            echo "Webhook failed with status $HTTP_CODE — code is on GitHub, deploy manually if needed"
            echo "Manual command: cd /path/to/plugin && git fetch origin && git reset --hard origin/main"
            exit 0
          fi
