; ============================================================
; LT Marketplace Suite - PHP Hardening Configuration
; Para producción: copiar a /usr/local/etc/php/conf.d/ltms-prod.ini
; ============================================================

; ── Seguridad ─────────────────────────────────────────────────
expose_php               = Off
display_errors           = Off
display_startup_errors   = Off
log_errors               = On
error_log                = /var/log/php/ltms-error.log
error_reporting          = E_ALL & ~E_DEPRECATED & ~E_STRICT
html_errors              = Off

; Prevenir ejecución de código en funciones de string
allow_url_fopen          = Off
allow_url_include        = Off

; Deshabilitar funciones peligrosas
disable_functions        = exec,passthru,shell_exec,system,proc_open,popen,curl_multi_exec,parse_ini_file,show_source,pcntl_exec,assert

; ── Rendimiento ───────────────────────────────────────────────
memory_limit             = 512M
max_execution_time       = 300
max_input_time           = 300
max_input_vars           = 5000

; ── Subida de Archivos ────────────────────────────────────────
upload_max_filesize      = 64M
post_max_size            = 64M
file_uploads             = On

; ── Sesiones (WordPress las maneja, pero hardening por si acaso)
session.cookie_httponly  = 1
session.cookie_secure    = 1
session.cookie_samesite  = Strict
session.use_strict_mode  = 1
session.gc_maxlifetime   = 1440

; ── OPcache (Rendimiento crítico para producción) ─────────────
opcache.enable           = 1
opcache.enable_cli       = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.revalidate_freq  = 60
opcache.fast_shutdown    = 1
opcache.validate_timestamps = 0

; ── Timezone ──────────────────────────────────────────────────
date.timezone            = America/Bogota
